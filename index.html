<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="Vmr4i2sbomFtDGa-ZMztIm4BreGK7GR0sakEgvwCpAw" />
<meta name="description" content="Basic Info — a simple demo web form that captures name, date of birth and PAN and saves submissions live. Built as a portfolio demonstration.">
<title>Basic Info</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16241f;
    --paper:#f3f1e9;
    --card:#ffffff;
    --line:#dcd8c9;
    --muted:#6f7770;
    --green:#1ea861;
    --green-deep:#0f7a45;
    --accent:#c2532a;
    --field:#faf9f4;
    --shadow:0 1px 2px rgba(22,36,31,.05),0 12px 40px -16px rgba(22,36,31,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:24px;
    background-image:radial-gradient(circle at 1px 1px,rgba(22,36,31,.04) 1px,transparent 0);
    background-size:22px 22px;
  }

  .card{
    width:100%;max-width:440px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:var(--shadow);
    overflow:hidden;
    position:relative;
  }
  .card__top{
    padding:34px 36px 26px;
    border-bottom:1px solid var(--line);
    position:relative;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent);margin-bottom:12px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;font-size:34px;line-height:1.05;
    letter-spacing:-.01em;
  }
  .sub{color:var(--muted);font-size:14px;margin-top:8px}

  form{padding:28px 36px 34px}
  .field{margin-bottom:20px}
  label{
    display:block;font-size:13px;font-weight:600;
    margin-bottom:7px;letter-spacing:.01em;
  }
  .hint{font-weight:400;color:var(--muted);font-size:12px;margin-left:6px}
  input{
    width:100%;font-family:inherit;font-size:15px;color:var(--ink);
    background:var(--field);
    border:1px solid var(--line);
    border-radius:10px;
    padding:13px 14px;
    transition:border-color .15s,box-shadow .15s,background .15s;
  }
  input::placeholder{color:#aab0a8}
  input:hover{border-color:#c7c3b2}
  input:focus{
    outline:none;background:#fff;
    border-color:var(--green);
    box-shadow:0 0 0 3px rgba(30,168,97,.14);
  }
  #pan{font-family:'IBM Plex Mono',monospace;letter-spacing:.12em;text-transform:uppercase}
  input.invalid{border-color:var(--accent);box-shadow:0 0 0 3px rgba(194,83,42,.12)}
  .err{
    display:none;color:var(--accent);font-size:12px;margin-top:6px;
  }
  .err.show{display:block}

  button{
    width:100%;font-family:inherit;font-size:15px;font-weight:600;
    color:#fff;background:var(--ink);
    border:none;border-radius:10px;
    padding:15px;margin-top:6px;cursor:pointer;
    transition:transform .12s,background .15s,opacity .15s;
  }
  button:hover{background:#0c1813}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.55;cursor:not-allowed}

  .foot{
    text-align:center;font-size:11px;color:var(--muted);
    padding:0 36px 24px;
  }

  /* ---- overlay (tick + thank you) ---- */
  .overlay{
    position:absolute;inset:0;
    background:rgba(255,255,255,.97);
    backdrop-filter:blur(2px);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    opacity:0;pointer-events:none;
    transition:opacity .25s;
  }
  .overlay.show{opacity:1;pointer-events:auto}

  /* stage 1: bouncing tick */
  .tick-wrap{display:flex;flex-direction:column;align-items:center}
  .tick{
    width:96px;height:96px;border-radius:50%;
    background:var(--green);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 14px 36px -10px rgba(30,168,97,.6);
  }
  .tick svg{width:52px;height:52px}
  .tick path{
    stroke:#fff;stroke-width:7;fill:none;
    stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:48;stroke-dashoffset:48;
  }
  .stage1.run .tick{animation:bounce 1.6s cubic-bezier(.28,.84,.42,1) forwards}
  .stage1.run .tick path{animation:draw .4s ease .25s forwards}
  .stage1 .label{
    font-family:'Fraunces',serif;font-size:21px;font-weight:600;
    margin-top:22px;opacity:0;
  }
  .stage1.run .label{animation:fadeUp .4s ease 1.1s forwards}

  @keyframes bounce{
    0%{transform:translateY(-120px) scale(.4);opacity:0}
    18%{transform:translateY(0) scale(1);opacity:1}
    34%{transform:translateY(-46px) scale(1)}
    50%{transform:translateY(0) scale(1)}
    66%{transform:translateY(-22px) scale(1)}
    80%{transform:translateY(0) scale(1)}
    100%{transform:translateY(0) scale(1)}
  }
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* stage 2: thank you */
  .stage2{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    text-align:center;padding:36px;
    opacity:0;pointer-events:none;transition:opacity .3s;
  }
  .stage2.show{opacity:1;pointer-events:auto}
  .stage2 .dot{
    width:46px;height:46px;border-radius:50%;
    background:var(--green);display:flex;align-items:center;justify-content:center;
    margin-bottom:20px;
  }
  .stage2 .dot svg{width:24px;height:24px}
  .stage2 .dot path{stroke:#fff;stroke-width:8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .stage2 h2{font-family:'Fraunces',serif;font-weight:600;font-size:30px;letter-spacing:-.01em}
  .stage2 p{color:var(--muted);font-size:14px;margin-top:10px;max-width:280px}
  .stage2 .again{
    margin-top:26px;width:auto;padding:12px 24px;
    background:transparent;color:var(--green-deep);
    border:1px solid var(--green);border-radius:10px;
  }
  .stage2 .again:hover{background:rgba(30,168,97,.08)}

  @media (max-width:480px){
    .card__top{padding:30px 26px 22px}
    form{padding:24px 26px 30px}
    .foot{padding:0 26px 22px}
    h1{font-size:30px}
  }
  @media (prefers-reduced-motion:reduce){
    .stage1.run .tick{animation:none}
    .stage1.run .tick path{animation:draw .3s ease forwards}
    .stage1.run .label{animation:fadeUp .3s ease forwards}
  }
</style>
</head>
<body>
  <main class="card">
    <div class="card__top">
      <div class="eyebrow">KYC · Quick capture</div>
      <h1>Basic Info</h1>
      <p class="sub">Three fields, saved the moment you submit.</p>
    </div>

    <form id="form" novalidate>
      <div class="field">
        <label for="name">Full name</label>
        <input id="name" name="name" type="text" placeholder="As on your records" autocomplete="name" required>
        <div class="err" data-for="name">Please enter your name.</div>
      </div>

      <div class="field">
        <label for="dob">Date of birth</label>
        <input id="dob" name="dob" type="date" required>
        <div class="err" data-for="dob">Please pick a valid date of birth.</div>
      </div>

      <div class="field">
        <label for="pan">PAN <span class="hint">e.g. ABCDE1234F</span></label>
        <input id="pan" name="pan" type="text" placeholder="ABCDE1234F" maxlength="10" autocomplete="off" required>
        <div class="err" data-for="pan">Enter a valid 10-character PAN.</div>
      </div>

      <button id="submitBtn" type="submit">Submit</button>
    </form>

    <div class="foot">Your details are saved securely on submit.</div>

    <!-- overlay -->
    <div class="overlay" id="overlay">
      <!-- stage 1 -->
      <div class="tick-wrap stage1" id="stage1">
        <div class="tick">
          <svg viewBox="0 0 60 60"><path d="M16 31 L26 41 L45 19"/></svg>
        </div>
        <div class="label">Submitted Successfully</div>
      </div>
      <!-- stage 2 -->
      <div class="stage2" id="stage2">
        <div class="dot"><svg viewBox="0 0 60 60"><path d="M16 31 L26 41 L45 19"/></svg></div>
        <h2>Thank you</h2>
        <p>Your information has been recorded. You're all set.</p>
        <button class="again" id="againBtn" type="button">Submit another</button>
      </div>
    </div>
  </main>

<script>
  // ===========================================================
  //  PASTE YOUR APPS SCRIPT WEB-APP URL BETWEEN THE QUOTES BELOW
  // ===========================================================
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJzhqCUj_WHHkpoyPp4CiozFDDt5KB9B5v6xgwRyRv5G8TCWFyKedfe7GKEm_fFz6LWQ/exec";

  const form = document.getElementById('form');
  const btn = document.getElementById('submitBtn');
  const overlay = document.getElementById('overlay');
  const stage1 = document.getElementById('stage1');
  const stage2 = document.getElementById('stage2');
  const panEl = document.getElementById('pan');

  const PAN_RE = /^[A-Z]{5}[0-9]{4}[A-Z]$/;

  // live uppercase for PAN
  panEl.addEventListener('input', () => {
    panEl.value = panEl.value.toUpperCase();
  });

  function showError(name, on){
    const input = document.getElementById(name);
    const err = document.querySelector('.err[data-for="'+name+'"]');
    input.classList.toggle('invalid', on);
    err.classList.toggle('show', on);
  }

  function validate(){
    let ok = true;
    const name = document.getElementById('name').value.trim();
    const dob = document.getElementById('dob').value;
    const pan = panEl.value.trim().toUpperCase();

    showError('name', !name);  if(!name) ok = false;

    const dobValid = dob && new Date(dob) < new Date();
    showError('dob', !dobValid); if(!dobValid) ok = false;

    showError('pan', !PAN_RE.test(pan)); if(!PAN_RE.test(pan)) ok = false;

    return ok;
  }

  // clear an error as soon as the field becomes valid-ish
  ['name','dob','pan'].forEach(id=>{
    document.getElementById(id).addEventListener('input',()=>showError(id,false));
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if(!validate()) return;

    btn.disabled = true;
    btn.textContent = 'Saving…';

    const payload = {
      name: document.getElementById('name').value.trim(),
      dob: document.getElementById('dob').value,
      pan: panEl.value.trim().toUpperCase()
    };

    try {
      if (SCRIPT_URL && SCRIPT_URL !== "PASTE_YOUR_WEB_APP_URL_HERE") {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          // text/plain avoids a CORS preflight that Apps Script can't handle
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
      }
      runSuccess();
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Submit';
      showError('pan', false);
      alert('Could not reach the server. Check your connection and the script URL, then try again.');
    }
  });

  function runSuccess(){
    // stage 1 — bouncing tick
    overlay.classList.add('show');
    stage1.classList.add('run');

    // after the tick + label settle, transition to stage 2 (thank you)
    setTimeout(() => {
      stage1.style.opacity = '0';
      setTimeout(() => {
        stage1.style.display = 'none';
        stage2.classList.add('show');
      }, 300);
    }, 2200);
  }

  document.getElementById('againBtn').addEventListener('click', () => {
    form.reset();
    btn.disabled = false;
    btn.textContent = 'Submit';
    stage2.classList.remove('show');
    stage1.style.display = '';
    stage1.style.opacity = '';
    stage1.classList.remove('run');
    overlay.classList.remove('show');
  });
</script>
</body>
</html>
